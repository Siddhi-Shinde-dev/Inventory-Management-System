<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Supplier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light" style="padding-top: 50px;">
<div class="container" style="max-width: 500px;">
    <div class="card shadow-sm p-4 bg-white" style="border-radius: 12px;">
        <h3 class="font-weight-bold mb-4 text-primary">Edit Supplier Details</h3>
        <form method="POST">
            <div class="form-group">
                <label class="font-weight-bold">Supplier Name</label>
                <input type="text" name="name" value="{{ supplier.name }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="font-weight-bold">Contact / Mobile Number</label>
                <input type="text" name="contact_info" value="{{ supplier.contact_info }}" class="form-control" required>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-success font-weight-bold">Update Details</button>
                <a href="/suppliers" class="btn btn-secondary font-weight-bold ml-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
