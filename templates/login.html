<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login - Inventory System</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  
  <style>
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: #0d2353; /* डॅशबोर्डच्या साइडबारचा रंग बॅकग्राउंडला दिलाय */
        background-image: radial-gradient(circle at 10% 20%, rgb(13, 35, 83) 0%, rgb(18, 53, 122) 90%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0; 
    }
    
    .login-container {
        background: #ffffff;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 420px;
    }
    
    .brand-logo {
        font-size: 24px;
        font-weight: 700;
        color: #0d2353;
        text-align: center;
        margin-bottom: 30px;
        letter-spacing: -0.5px;
    }

    .brand-logo i {
        color: #1a68ff;
    }
    
    .form-control {
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        padding: 12px 14px;
        height: auto;
        font-size: 14px;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        border-color: #1a68ff;
        box-shadow: 0 0 0 3px rgba(26, 104, 255, 0.1);
    }

    label {
        font-size: 14px;
        font-weight: 500;
        color: #48556c;
        margin-bottom: 6px;
    }

    .btn-login {
        background-color: #1a68ff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        color: white;
        transition: background 0.2s;
    }

    .btn-login:hover {
        background-color: #0052cc;
        color: white;
    }

    .register-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #64748b;
    }

    .register-link a {
        color: #1a68ff;
        font-weight: 600;
        text-decoration: none;
    }
    
    .register-link a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="login-container">
    <!-- 🏢 BRAND LOGO (Exact Dashboard Match) -->
    <div class="brand-logo">
        <i class="fa-solid fa-cube mr-2"></i> Inventory System
    </div>
    
    <h5 class="font-weight-bold text-center mb-4" style="color: #1e293b;">Welcome Back</h5>
    
    <!-- 📝 LOGIN FORM -->
    <form action="/login" method="POST">
        <div class="form-group mb-3">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" name="email" required>
        </div>
        
        <div class="form-group mb-4">
            <label for="pwd">Password</label>
            <input type="password" class="form-control" id="pwd" placeholder="Enter your password" name="password" required>
        </div>

        <button type="submit" class="btn btn-login btn-block shadow-sm">
            <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
        </button>
        
        <!-- 🔗 REGISTER LINK -->
        <div class="register-link">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </form>
</div>

</body>
</html>
